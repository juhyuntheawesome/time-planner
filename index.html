<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하루 플래너</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f7f6f3; --bg3: #f0efe9;
    --text: #1a1a1a; --text2: #555; --text3: #999;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.2);
    --radius: 8px; --radius-lg: 12px;
    --green-bg: #eaf3de; --green-text: #27500a;
    --yellow-bg: #fef9e7; --yellow-text: #7d6608;
    --red-bg: #fdeaea; --red-text: #7b1c1c;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1e; --bg2: #2a2a2a; --bg3: #333;
      --text: #f0f0f0; --text2: #aaa; --text3: #666;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --green-bg: #173404; --green-text: #c0dd97;
      --yellow-bg: #412402; --yellow-text: #fac775;
      --red-bg: #501313; --red-text: #f09595;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }

  /* ── setup screen ── */
  #setup-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
  .setup-card { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 2rem; width: 440px; max-width: 100%; }
  .setup-card h1 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .setup-card p { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; line-height: 1.6; }
  .setup-card a { color: #2563eb; }
  .form-group { margin-bottom: 14px; }
  .form-group label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 4px; }
  .form-group input { width: 100%; padding: 8px 10px; font-size: 13px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); }
  .form-group input:focus { outline: none; border-color: #2563eb; }
  .form-group .hint { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .btn-primary { width: 100%; padding: 10px; font-size: 14px; font-weight: 500; background: var(--text); color: var(--bg); border: none; border-radius: var(--radius); cursor: pointer; margin-top: 8px; }
  .btn-primary:hover { opacity: 0.88; }
  .error-msg { font-size: 12px; color: var(--red-text); background: var(--red-bg); border-radius: var(--radius); padding: 8px 10px; margin-top: 10px; display: none; }

  /* ── app ── */
  #app { display: none; max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }
  .top-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .app-title { font-size: 16px; font-weight: 600; }
  .date-input { font-size: 13px; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 5px 9px; background: var(--bg); color: var(--text); }
  .tabs { display: flex; gap: 4px; }
  .tab { padding: 5px 13px; font-size: 13px; border: 0.5px solid var(--border); border-radius: var(--radius); cursor: pointer; background: var(--bg); color: var(--text2); }
  .tab.active { background: var(--bg3); color: var(--text); font-weight: 500; }
  .notion-bar { display: flex; gap: 8px; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; }
  .notion-btn { display: flex; align-items: center; gap: 6px; padding: 6px 13px; font-size: 12px; border-radius: var(--radius); cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); }
  .notion-btn:hover { background: var(--bg2); }
  .notion-btn.primary { background: var(--bg2); color: var(--text); font-weight: 500; }
  .settings-btn { margin-left: auto; font-size: 12px; color: var(--text3); cursor: pointer; border: none; background: none; padding: 4px 8px; }
  .settings-btn:hover { color: var(--text2); }
  .status-msg { font-size: 12px; color: var(--text3); }
  .status-msg.ok { color: #1a7340; }
  .status-msg.err { color: #a32d2d; }

  /* ── timeline layout ── */
  .main { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .panel { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .panel-header { padding: 9px 13px; font-size: 13px; font-weight: 500; border-bottom: 0.5px solid var(--border); background: var(--bg2); display: flex; align-items: center; justify-content: space-between; }
  .add-btn { font-size: 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 3px 10px; cursor: pointer; background: var(--bg); color: var(--text2); }
  .add-btn:hover { background: var(--bg2); }
  .timeline-wrap { position: relative; padding-left: 38px; background: var(--bg); }
  .hour-line { position: absolute; left: 38px; right: 0; height: 0.5px; background: var(--border); }
  .hour-label { position: absolute; left: 0; width: 34px; font-size: 10px; color: var(--text3); text-align: right; transform: translateY(-50%); padding-right: 5px; }
  .block { position: absolute; left: 4px; right: 4px; border-radius: 5px; padding: 3px 7px; cursor: pointer; overflow: hidden; border: none; text-align: left; transition: opacity 0.1s; }
  .block:hover { opacity: 0.82; }
  .block-title { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .block-time { font-size: 10px; opacity: 0.72; }
  .empty-hint { text-align: center; padding: 2.5rem 1rem; font-size: 13px; color: var(--text3); }

  /* ── compare ── */
  .compare-panel { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .compare-header { display: grid; grid-template-columns: 58px 1fr 1fr; font-size: 12px; font-weight: 500; color: var(--text2); border-bottom: 0.5px solid var(--border); background: var(--bg2); }
  .compare-header > div { padding: 8px 10px; border-right: 0.5px solid var(--border); }
  .compare-header > div:last-child { border-right: none; }
  .compare-row { display: grid; grid-template-columns: 58px 1fr 1fr; border-bottom: 0.5px solid var(--border); }
  .compare-row:last-child { border-bottom: none; }
  .compare-time { padding: 7px 8px; font-size: 11px; color: var(--text3); border-right: 0.5px solid var(--border); display: flex; align-items: center; }
  .compare-cell { padding: 7px 10px; border-right: 0.5px solid var(--border); }
  .compare-cell:last-child { border-right: none; }
  .cell-title { font-size: 12px; }
  .cell-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .row-match { background: var(--green-bg); }
  .row-diff { background: var(--yellow-bg); }

  /* ── modal ── */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); align-items: center; justify-content: center; z-index: 100; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border2); padding: 1.25rem; width: 310px; max-width: 92vw; }
  .modal h3 { font-size: 14px; font-weight: 600; margin-bottom: 1rem; }
  .frow { margin-bottom: 11px; }
  .frow label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 3px; }
  .frow input, .frow select, .frow textarea { width: 100%; padding: 6px 9px; font-size: 13px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); }
  .frow textarea { height: 54px; resize: none; }
  .frow input:focus, .frow select:focus, .frow textarea:focus { outline: none; border-color: #2563eb; }
  .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .modal-actions { display: flex; gap: 7px; margin-top: 1rem; justify-content: flex-end; }
  .btn-cancel { font-size: 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 5px 12px; cursor: pointer; background: transparent; color: var(--text2); }
  .btn-save { font-size: 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 5px 12px; cursor: pointer; background: var(--bg2); color: var(--text); font-weight: 500; }
  .btn-del { font-size: 12px; border: 0.5px solid #e24b4a; border-radius: var(--radius); padding: 5px 12px; cursor: pointer; background: transparent; color: #a32d2d; margin-right: auto; }

  /* ── loading ── */
  .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.2); align-items: center; justify-content: center; z-index: 200; }
  .loading-overlay.show { display: flex; }
  .loading-box { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border2); padding: 1.25rem 1.75rem; font-size: 14px; color: var(--text2); }

  @media (max-width: 600px) {
    .main { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ── SETUP SCREEN ── -->
<div id="setup-screen">
  <div class="setup-card">
    <h1>⏱️ 하루 플래너 설정</h1>
    <p>노션과 연동하려면 Integration Token과 DB ID가 필요해요.<br>
    <a href="https://www.notion.so/my-integrations" target="_blank">notion.so/my-integrations</a>에서 토큰을 만들고, Time Planner DB에 Integration을 연결해주세요.</p>

    <div class="form-group">
      <label>Notion Integration Token</label>
      <input type="password" id="inp-token" placeholder="secret_xxxxxxxxxxxxxxxxxxxx">
      <div class="hint">입력값은 이 브라우저 탭 안에서만 저장돼요 (localStorage)</div>
    </div>
    <div class="form-group">
      <label>Time Planner DB ID</label>
      <input type="text" id="inp-dbid" placeholder="095435769e92477e979f0c7311f8ef56">
      <div class="hint">노션 DB URL에서 ?v= 앞의 32자리 ID예요</div>
    </div>
    <button class="btn-primary" onclick="setupStart()">연결하고 시작하기</button>
    <div class="error-msg" id="setup-error"></div>
    <p style="font-size:12px; color: var(--text3); margin-top: 14px; text-align:center">
      또는 <a href="#" onclick="skipSetup()" style="color:#2563eb">노션 연동 없이 사용하기</a>
    </p>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="app">
  <div class="top-bar">
    <span class="app-title">⏱️ 하루 플래너</span>
    <input type="date" class="date-input" id="date-input">
    <div class="tabs">
      <button class="tab active" onclick="setTab('plan')">계획</button>
      <button class="tab" onclick="setTab('actual')">실제</button>
      <button class="tab" onclick="setTab('compare')">비교</button>
    </div>
    <button class="settings-btn" onclick="showSetup()">⚙️ 설정</button>
  </div>

  <div class="notion-bar" id="notion-bar">
    <button class="notion-btn" onclick="loadFromNotion()">↓ 노션에서 불러오기</button>
    <button class="notion-btn primary" onclick="saveToNotion()">↑ 노션에 저장</button>
    <span class="status-msg" id="status-msg"></span>
  </div>

  <div id="timeline-view" class="main">
    <div class="panel">
      <div class="panel-header"><span>📋 계획</span><button class="add-btn" onclick="openModal('plan')">+ 추가</button></div>
      <div id="plan-timeline"></div>
    </div>
    <div class="panel">
      <div class="panel-header"><span>✅ 실제</span><button class="add-btn" onclick="openModal('actual')">+ 추가</button></div>
      <div id="actual-timeline"></div>
    </div>
  </div>

  <div id="compare-view" style="display:none; margin-top:0;">
    <div class="compare-panel">
      <div class="compare-header"><div>시간</div><div>📋 계획</div><div>✅ 실제</div></div>
      <div id="compare-rows"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3 id="modal-title">블록 추가</h3>
    <div class="frow"><label>제목</label><input type="text" id="f-title" placeholder="예: 공부, 점심, 운동"></div>
    <div class="frow"><label>시간</label><div class="time-row"><select id="f-start"></select><select id="f-end"></select></div></div>
    <div class="frow"><label>카테고리</label>
      <select id="f-cat">
        <option value="집중업무">🎯 집중업무</option>
        <option value="학습">📚 학습</option>
        <option value="식사">🍽️ 식사</option>
        <option value="운동">🏃 운동</option>
        <option value="휴식">💤 휴식</option>
        <option value="루틴">🚿 루틴</option>
        <option value="이동">🚗 이동</option>
        <option value="소통">💬 소통</option>
        <option value="기타">⚡ 기타</option>
      </select>
    </div>
    <div class="frow"><label>메모</label><textarea id="f-memo" placeholder="선택사항"></textarea></div>
    <div class="modal-actions">
      <button class="btn-del" id="btn-del" style="display:none" onclick="deleteBlock()">삭제</button>
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveBlock()">저장</button>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-box" id="loading-msg">처리 중...</div>
</div>

<script>
const CAT_COLORS = {
  '집중업무': { bg: '#dbeafe', text: '#1e3a5f' },
  '학습':     { bg: '#dcfce7', text: '#14532d' },
  '식사':     { bg: '#fef9c3', text: '#713f12' },
  '운동':     { bg: '#ffedd5', text: '#7c2d12' },
  '휴식':     { bg: '#f3f4f6', text: '#374151' },
  '루틴':     { bg: '#ede9fe', text: '#3b0764' },
  '이동':     { bg: '#f5f5f4', text: '#44403c' },
  '소통':     { bg: '#fce7f3', text: '#831843' },
  '기타':     { bg: '#d1fae5', text: '#064e3b' },
};
const CAT_TO_NOTION = {
  '집중업무':'🎯 집중업무','학습':'📚 학습','식사':'🍽️ 식사',
  '운동':'🏃 운동','휴식':'💤 휴식','루틴':'🚿 루틴',
  '이동':'🚗 이동','소통':'💬 소통','기타':'⚡ 기타',
};
const CAT_FROM_NOTION = Object.fromEntries(Object.entries(CAT_TO_NOTION).map(([k,v])=>[v,k]));

const START_H = 6, END_H = 23, PPM = 2;
const TH = (END_H - START_H) * 60 * PPM;

let data = { plan: [], actual: [] };
let currentType = 'plan', editingId = null, currentTab = 'plan';
let notionToken = '', notionDbId = '';

// ── time options ──
const times = [];
for (let h = 5; h <= 24; h++) for (let m = 0; m < 60; m += 10) {
  if (h === 24 && m > 0) break;
  times.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
}
['f-start','f-end'].forEach(id => {
  const sel = document.getElementById(id);
  times.forEach(t => sel.innerHTML += `<option value="${t}">${t}</option>`);
});
document.getElementById('f-start').value = '09:00';
document.getElementById('f-end').value = '10:00';

const dateInput = document.getElementById('date-input');
dateInput.value = new Date().toISOString().slice(0,10);

// ── init ──
function init() {
  notionToken = localStorage.getItem('planner_token') || '';
  notionDbId  = localStorage.getItem('planner_dbid')  || '';
  if (true) {
    document.getElementById('inp-token').value = notionToken;
    document.getElementById('inp-dbid').value  = notionDbId;
    launchApp();
  }
}

function setupStart() {
  const token = document.getElementById('inp-token').value.trim();
  const dbid  = document.getElementById('inp-dbid').value.trim().replace(/-/g,'');
  if (!token || !dbid) { showSetupError('토큰과 DB ID를 모두 입력해주세요'); return; }
  localStorage.setItem('planner_token', token);
  localStorage.setItem('planner_dbid',  dbid);
  notionToken = token; notionDbId = dbid;
  launchApp();
}
function skipSetup() {
  notionToken = ''; notionDbId = '';
  launchApp();
}
function showSetup() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
}
function launchApp() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('notion-bar').style.display = 'flex';
  renderTimeline('plan'); renderTimeline('actual');
}
function showSetupError(msg) {
  const el = document.getElementById('setup-error');
  el.textContent = msg; el.style.display = 'block';
}

// ── helpers ──
function uid() { return Math.random().toString(36).slice(2); }
function toMin(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
function setStatus(msg, type='') {
  const el = document.getElementById('status-msg');
  el.textContent = msg; el.className = 'status-msg' + (type?' '+type:'');
  if (type==='ok') setTimeout(()=>{ el.textContent=''; el.className='status-msg'; }, 3000);
}
function showLoading(msg) { document.getElementById('loading-msg').textContent = msg; document.getElementById('loading-overlay').classList.add('show'); }
function hideLoading() { document.getElementById('loading-overlay').classList.remove('show'); }

// ── tabs ──
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', ['plan','actual','compare'][i]===tab));
  document.getElementById('timeline-view').style.display = tab==='compare'?'none':'grid';
  document.getElementById('compare-view').style.display  = tab==='compare'?'block':'none';
  if (tab==='compare') renderCompare();
}

// ── render timeline ──
function renderTimeline(type) {
  const container = document.getElementById(`${type}-timeline`);
  const blocks = data[type];
  if (!blocks.length) {
    container.innerHTML = `<div class="empty-hint">+ 추가로 블록을 만드세요</div>`;
    return;
  }
  const wrap = document.createElement('div');
  wrap.className = 'timeline-wrap';
  wrap.style.height = (TH + 16) + 'px';
  for (let h = START_H; h <= END_H; h++) {
    const y = (h - START_H) * 60 * PPM;
    const line = document.createElement('div'); line.className = 'hour-line'; line.style.top = y+'px'; wrap.appendChild(line);
    const lbl  = document.createElement('div'); lbl.className  = 'hour-label'; lbl.style.top  = y+'px'; lbl.textContent = String(h).padStart(2,'0')+':00'; wrap.appendChild(lbl);
  }
  const area = document.createElement('div'); area.style.cssText = `position:relative;height:${TH}px`;
  blocks.forEach(b => {
    const top = Math.max(0,(toMin(b.start)-START_H*60)*PPM);
    const ht  = Math.max(18,(toMin(b.end)-toMin(b.start))*PPM-2);
    const col = CAT_COLORS[b.cat]||CAT_COLORS['기타'];
    const el = document.createElement('button'); el.className = 'block';
    el.style.cssText = `top:${top}px;height:${ht}px;background:${col.bg};color:${col.text}`;
    el.innerHTML = `<div class="block-title">${b.title}</div>${ht>26?`<div class="block-time">${b.start}–${b.end}</div>`:''}`;
    el.onclick = () => openModal(type, b.id);
    area.appendChild(el);
  });
  wrap.appendChild(area);
  container.innerHTML = ''; container.appendChild(wrap);
}

// ── render compare ──
function renderCompare() {
  const allTimes = [...new Set([...data.plan,...data.actual].map(b=>b.start))].sort();
  const el = document.getElementById('compare-rows');
  if (!allTimes.length) { el.innerHTML='<div style="padding:2rem;text-align:center;font-size:13px;color:var(--text3)">블록을 추가하면 여기서 비교돼요</div>'; return; }
  el.innerHTML = allTimes.map(t => {
    const p = data.plan.find(b=>b.start===t), a = data.actual.find(b=>b.start===t);
    const cls = (p&&a)?(p.cat===a.cat?'row-match':'row-diff'):'';
    const pC = p?CAT_COLORS[p.cat]:null, aC = a?CAT_COLORS[a.cat]:null;
    return `<div class="compare-row ${cls}">
      <div class="compare-time">${t}</div>
      <div class="compare-cell">${p?`<div class="cell-title" style="color:${pC.text}">${p.title}</div><div class="cell-sub">${p.start}–${p.end} · ${p.cat}</div>`:'<span style="font-size:11px;color:var(--text3)">—</span>'}</div>
      <div class="compare-cell">${a?`<div class="cell-title" style="color:${aC.text}">${a.title}</div><div class="cell-sub">${a.start}–${a.end} · ${a.cat}</div>`:'<span style="font-size:11px;color:var(--text3)">—</span>'}</div>
    </div>`;
  }).join('');
}

// ── modal ──
function openModal(type, id=null) {
  currentType=type; editingId=id;
  const del = document.getElementById('btn-del');
  if (id) {
    const b = data[type].find(x=>x.id===id);
    document.getElementById('modal-title').textContent = '블록 수정';
    document.getElementById('f-title').value = b.title;
    document.getElementById('f-start').value = b.start;
    document.getElementById('f-end').value   = b.end;
    document.getElementById('f-cat').value   = b.cat;
    document.getElementById('f-memo').value  = b.memo||'';
    del.style.display = 'block';
  } else {
    document.getElementById('modal-title').textContent = (type==='plan'?'계획':'실제 기록')+' 추가';
    document.getElementById('f-title').value = '';
    document.getElementById('f-start').value = '09:00';
    document.getElementById('f-end').value   = '10:00';
    document.getElementById('f-cat').value   = '학습';
    document.getElementById('f-memo').value  = '';
    del.style.display = 'none';
  }
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 50);
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); editingId=null; }
function saveBlock() {
  const title = document.getElementById('f-title').value.trim();
  const start = document.getElementById('f-start').value;
  const end   = document.getElementById('f-end').value;
  const cat   = document.getElementById('f-cat').value;
  const memo  = document.getElementById('f-memo').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  if (toMin(end)<=toMin(start)) { alert('종료 시간은 시작 시간 이후여야 해요'); return; }
  if (editingId) {
    const idx = data[currentType].findIndex(x=>x.id===editingId);
    data[currentType][idx] = {id:editingId,title,start,end,cat,memo};
  } else {
    data[currentType].push({id:uid(),title,start,end,cat,memo});
  }
  closeModal(); renderTimeline('plan'); renderTimeline('actual');
  if (currentTab==='compare') renderCompare();
}
function deleteBlock() {
  data[currentType] = data[currentType].filter(x=>x.id!==editingId);
  closeModal(); renderTimeline('plan'); renderTimeline('actual');
}
document.getElementById('modal-bg').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeModal(); });

// ── notion API ──
async function notionFetch(path, opts={}) {
  const res = await fetch('http://localhost:8765/notion' + path, {
    ...opts,
    headers: {
      'Authorization': 'Bearer ' + notionToken,
      'Notion-Version': '2022-06-28',
      'Content-Type': 'application/json',
      ...(opts.headers||{})
    }
  });
  if (!res.ok) throw new Error(`Notion API 오류: ${res.status}`);
  return res.json();
}

async function saveToNotion() {
  const date = dateInput.value;
  if (!date) { setStatus('날짜를 선택해주세요','err'); return; }
  const all = [...data.plan.map(b=>({...b,type:'plan'})), ...data.actual.map(b=>({...b,type:'actual'}))];
  if (!all.length) { setStatus('저장할 블록이 없어요','err'); return; }

  showLoading(`노션에 저장 중... (0/${all.length})`);
  let saved = 0;
  const WEBHOOK = 'https://hook.us2.make.com/h9d3rp6wpj62bv4wk8ox3jyq5asth6a3';
  try {
    for (const b of all) {
      await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title: `[${date}] ${b.title}`,
          date:  date,
          start: b.start,
          end:   b.end,
          cat:   CAT_TO_NOTION[b.cat] || b.cat,
          type:  b.type === 'plan' ? '계획' : '실제',
          memo:  b.memo || ''
        })
      });
      saved++;
      document.getElementById('loading-msg').textContent = `노션에 저장 중... (${saved}/${all.length})`;
    }
    setStatus(`${saved}개 블록 저장 완료`, 'ok');
  } catch(e) {
    setStatus('저장 실패: ' + e.message, 'err');
  }
  hideLoading();
}

async function loadFromNotion() {
  const date = dateInput.value;
  if (!date) { setStatus('날짜를 선택해주세요','err'); return; }
  showLoading('노션에서 불러오는 중...');
  try {
    const res = await fetch('/api/load', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date })
    });
    if (!res.ok) throw new Error('서버 오류: ' + res.status);
    const result = await res.json();
    if (result.error) throw new Error(result.error);
    data.plan   = result.plan.map(b=>({...b, id:uid()}));
    data.actual = result.actual.map(b=>({...b, id:uid()}));
    renderTimeline('plan'); renderTimeline('actual');
    if (currentTab==='compare') renderCompare();
    const total = data.plan.length + data.actual.length;
    setStatus(`${total}개 블록 불러옴`, 'ok');
  } catch(e) {
    setStatus('불러오기 실패: ' + e.message, 'err');
  }
  hideLoading();
}

init();
</script>
