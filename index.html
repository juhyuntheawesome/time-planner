<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하루 플래너</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f7f6f3; --bg3: #efefed;
  --text: #1a1a1a; --text2: #666; --text3: #aaa;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.15);
  --radius: 7px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1e1e1e; --bg2: #2a2a2a; --bg3: #333;
    --text: #f0f0f0; --text2: #aaa; --text3: #666;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
  }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

/* header */
.header { display: flex; align-items: center; justify-content: center; padding: 10px 16px; border-bottom: 0.5px solid var(--border2); background: var(--bg); position: relative; }
.date-nav { display: flex; align-items: center; gap: 8px; }
.nav-btn { border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 8px 16px; cursor: pointer; background: var(--bg); color: var(--text2); font-size: 18px; line-height: 1; min-width: 44px; min-height: 44px; }
.nav-btn:hover { background: var(--bg2); }
.date-label { font-size: 15px; font-weight: 600; min-width: 140px; text-align: center; }
.sync-badge { font-size: 11px; color: var(--text3); padding: 3px 8px; border-radius: 20px; background: var(--bg2); }
.sync-badge.syncing { color: #2563eb; background: #eff6ff; }
.sync-badge.ok { color: #16a34a; background: #f0fdf4; }
.sync-badge.err { color: #dc2626; background: #fef2f2; }
@media (prefers-color-scheme: dark) {
  .sync-badge.syncing { background: #1e3a5f; }
  .sync-badge.ok { background: #14532d22; }
  .sync-badge.err { background: #7f1d1d22; }
}

/* column headers */
.col-headers { display: grid; grid-template-columns: 44px 1fr 1fr; border-bottom: 0.5px solid var(--border2); background: var(--bg2); }
.col-header { padding: 7px 0; font-size: 12px; font-weight: 500; color: var(--text2); text-align: center; border-right: 0.5px solid var(--border2); display: flex; align-items: center; justify-content: center; gap: 6px; }
.col-header:last-child { border-right: none; }
.add-btn { font-size: 11px; border: 0.5px solid var(--border2); border-radius: 4px; padding: 1px 7px; cursor: pointer; background: var(--bg); color: var(--text2); line-height: 1.6; }
.add-btn:hover { background: var(--bg3); }

/* grid */
.planner-grid { display: grid; grid-template-columns: 44px 1fr 1fr; }
.time-col { border-right: 0.5px solid var(--border2); }
.plan-col { border-right: 0.5px solid var(--border2); }
.actual-col { }

/* hour row */
.hour-group { display: contents; }
.hour-label-cell { grid-column: 1; display: flex; align-items: flex-start; justify-content: flex-end; padding: 4px 6px 0 0; border-bottom: 0.5px solid var(--border2); }
.hour-label-cell span { font-size: 10px; color: var(--text3); line-height: 1; margin-top: -1px; }
.cells-col { border-bottom: 0.5px solid var(--border2); position: relative; }

/* 10min cells */
.ten-min-grid { display: grid; grid-template-columns: repeat(6, 1fr); height: 48px; }
.cell { border-right: 0.5px solid var(--border); cursor: pointer; position: relative; transition: background 0.1s; }
.cell:last-child { border-right: none; }
.cell:hover { background: var(--bg2); }
.cell.has-block { cursor: default; }
.cell.has-block:hover { background: transparent; }

/* block overlay */
.block-overlay { position: absolute; top: 1px; bottom: 1px; border-radius: 4px; overflow: hidden; display: flex; flex-direction: column; justify-content: center; padding: 2px 5px; cursor: pointer; z-index: 2; border: none; text-align: left; }
.block-overlay:hover { opacity: 0.85; }
.block-title { font-size: 10px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
.block-time-label { font-size: 9px; opacity: 0.7; line-height: 1.3; }

/* modal */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.28); align-items: center; justify-content: center; z-index: 100; }
.modal-bg.open { display: flex; }
.modal { background: var(--bg); border-radius: 12px; border: 0.5px solid var(--border2); padding: 1.1rem; width: 295px; max-width: 93vw; box-shadow: 0 4px 24px rgba(0,0,0,0.12); }
.modal h3 { font-size: 13px; font-weight: 600; margin-bottom: 0.9rem; }
.frow { margin-bottom: 10px; }
.frow label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 3px; }
.frow input, .frow select, .frow textarea { width: 100%; padding: 6px 8px; font-size: 13px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); }
.frow input:focus, .frow select:focus, .frow textarea:focus { outline: none; border-color: #2563eb; }
.frow textarea { height: 52px; resize: none; }
.time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.modal-actions { display: flex; gap: 7px; margin-top: 0.9rem; justify-content: flex-end; }
.btn-cancel { font-size: 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 5px 12px; cursor: pointer; background: transparent; color: var(--text2); }
.btn-save { font-size: 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 5px 12px; cursor: pointer; background: var(--bg2); color: var(--text); font-weight: 500; }
.btn-del { font-size: 12px; border: 0.5px solid #e24b4a; border-radius: var(--radius); padding: 5px 12px; cursor: pointer; background: transparent; color: #dc2626; margin-right: auto; }
</style>
</head>
<body>

<div class="header">
  <div class="date-nav">
    <button class="nav-btn" onclick="changeDate(-1)">‹</button>
    <div style="position:relative;">
      <button class="date-label" id="date-label-text" onclick="toggleCal()" style="cursor:pointer;background:none;border:none;font-size:15px;font-weight:600;min-width:140px;"></button>
      <div id="cal-popup" style="display:none;position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--bg);border:0.5px solid var(--border2);border-radius:10px;padding:12px;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,0.15);width:220px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <button onclick="calMonth(-1)" style="border:none;background:none;cursor:pointer;font-size:16px;color:var(--text2);padding:2px 6px;">‹</button>
          <span id="cal-title" style="font-size:13px;font-weight:500;"></span>
          <button onclick="calMonth(1)" style="border:none;background:none;cursor:pointer;font-size:16px;color:var(--text2);padding:2px 6px;">›</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;">
          <span style="font-size:10px;color:var(--text3);padding:2px;">일</span>
          <span style="font-size:10px;color:var(--text3);padding:2px;">월</span>
          <span style="font-size:10px;color:var(--text3);padding:2px;">화</span>
          <span style="font-size:10px;color:var(--text3);padding:2px;">수</span>
          <span style="font-size:10px;color:var(--text3);padding:2px;">목</span>
          <span style="font-size:10px;color:var(--text3);padding:2px;">금</span>
          <span style="font-size:10px;color:var(--text3);padding:2px;">토</span>
        </div>
        <div id="cal-days" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;"></div>
      </div>
    </div>
    <button class="nav-btn" onclick="changeDate(1)">›</button>
  </div>
  <span class="sync-badge" id="sync-badge" style="position:absolute;right:16px;"></span>
</div>

<div class="col-headers">
  <div class="col-header" style="border-right:0.5px solid var(--border2)"></div>
  <div class="col-header">📋 계획 <button class="add-btn" onclick="openModal('plan')">+</button></div>
  <div class="col-header">✅ 실제 <button class="add-btn" onclick="openModal('actual')">+</button></div>
</div>

<div class="planner-grid" id="planner-grid"></div>

<!-- 카테고리 관리 모달 -->
<div class="modal-bg" id="cat-modal-bg">
  <div class="modal" style="width:320px;">
    <h3 style="margin-bottom:0.8rem;">카테고리 관리</h3>
    <div id="cat-list" style="max-height:280px;overflow-y:auto;margin-bottom:12px;"></div>
    <div style="display:flex;gap:6px;padding-top:10px;border-top:0.5px solid var(--border2);">
      <input type="text" id="new-cat-emoji" placeholder="😀" style="width:52px;padding:6px 8px;font-size:14px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);">
      <input type="text" id="new-cat-name" placeholder="새 카테고리 이름" style="flex:1;padding:6px 8px;font-size:13px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);">
      <button onclick="addCat()" style="padding:6px 12px;font-size:12px;border:0.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:var(--bg2);color:var(--text);font-weight:500;">추가</button>
    </div>
    <div style="text-align:right;margin-top:10px;">
      <button class="btn-cancel" onclick="closeCatManager()">닫기</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3 id="modal-title">블록 추가</h3>
    <div class="frow"><label>제목</label><input type="text" id="f-title" placeholder="예: 공부, 점심, 운동"></div>
    <div class="frow"><label>시간</label>
      <div class="time-row"><select id="f-start"></select><select id="f-end"></select></div>
    </div>
    <div class="frow">
      <label style="display:flex;align-items:center;justify-content:space-between;">
        카테고리 <button onclick="openCatManager()" style="font-size:10px;border:0.5px solid var(--border2);border-radius:4px;padding:1px 7px;cursor:pointer;background:none;color:var(--text2);">관리</button>
      </label>
      <select id="f-cat"></select>
    </div>
    <div class="frow"><label>메모</label><textarea id="f-memo" placeholder="선택사항"></textarea></div>
    <div class="modal-actions">
      <button class="btn-del" id="btn-del" style="display:none" onclick="deleteBlock()">삭제</button>
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveBlock()">저장</button>
    </div>
  </div>
</div>

<script>
const COLOR_PALETTE = [
  { bg: '#dbeafe', text: '#1e3a5f' },
  { bg: '#dcfce7', text: '#14532d' },
  { bg: '#fef9c3', text: '#713f12' },
  { bg: '#ffedd5', text: '#7c2d12' },
  { bg: '#f3f4f6', text: '#374151' },
  { bg: '#ede9fe', text: '#3b0764' },
  { bg: '#fce7f3', text: '#831843' },
  { bg: '#d1fae5', text: '#064e3b' },
  { bg: '#fae8ff', text: '#6b21a8' },
  { bg: '#fef2f2', text: '#991b1b' },
  { bg: '#ecfdf5', text: '#065f46' },
  { bg: '#fff7ed', text: '#9a3412' },
];

const DEFAULT_CATS = [
  { name: '집중업무', emoji: '🎯', color: 0 },
  { name: '학습',     emoji: '📚', color: 1 },
  { name: '식사',     emoji: '🍽️', color: 2 },
  { name: '운동',     emoji: '🏃', color: 3 },
  { name: '휴식',     emoji: '💤', color: 4 },
  { name: '루틴',     emoji: '🚿', color: 5 },
  { name: '이동',     emoji: '🚗', color: 6 },
  { name: '소통',     emoji: '💬', color: 7 },
  { name: '기타',     emoji: '⚡', color: 1 },
];

let categories = JSON.parse(localStorage.getItem('planner_cats') || 'null') || DEFAULT_CATS;

function saveCats() { localStorage.setItem('planner_cats', JSON.stringify(categories)); }
function getCatColor(name) {
  const cat = categories.find(c => c.name === name);
  return cat ? COLOR_PALETTE[cat.color % COLOR_PALETTE.length] : { bg: '#f3f4f6', text: '#374151' };
}
function getCatLabel(name) {
  const cat = categories.find(c => c.name === name);
  return cat ? `${cat.emoji} ${cat.name}` : name;
}
const CAT_MAP = Object.fromEntries(categories.map(c => [c.name, `${c.emoji} ${c.name}`]));
const CAT_FROM = Object.fromEntries(categories.map(c => [`${c.emoji} ${c.name}`, c.name]));

const START_H = 6, END_H = 23;
const HOURS = Array.from({length: END_H - START_H}, (_, i) => START_H + i);

let data = { plan: [], actual: [] };
let currentType = 'plan', editingId = null;
const _today = new Date();
let currentDate = `${_today.getFullYear()}-${String(_today.getMonth()+1).padStart(2,'0')}-${String(_today.getDate()).padStart(2,'0')}`;
let saveTimer = null;

// time selects
const times = [];
for (let h = 5; h <= 24; h++) for (let m = 0; m < 60; m += 10) {
  if (h === 24 && m > 0) break;
  times.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
}
['f-start','f-end'].forEach(id => {
  const sel = document.getElementById(id);
  times.forEach(t => sel.innerHTML += `<option value="${t}">${t}</option>`);
});
document.getElementById('f-start').value = '09:00';
document.getElementById('f-end').value = '10:00';

function uid() { return Math.random().toString(36).slice(2); }

function refreshCatSelect(selectedVal) {
  const sel = document.getElementById('f-cat');
  sel.innerHTML = categories.map(c =>
    `<option value="${c.name}">${c.emoji} ${c.name}</option>`
  ).join('');
  if (selectedVal) sel.value = selectedVal;
}

function openCatManager() {
  renderCatList();
  document.getElementById('cat-modal-bg').classList.add('open');
}
function closeCatManager() {
  document.getElementById('cat-modal-bg').classList.remove('open');
  refreshCatSelect(document.getElementById('f-cat').value);
}

function renderCatList() {
  const list = document.getElementById('cat-list');
  list.innerHTML = categories.map((c, i) => `
    <div style="display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:0.5px solid var(--border);">
      <span style="font-size:16px;width:24px;text-align:center;">${c.emoji}</span>
      <span style="flex:1;font-size:13px;">${c.name}</span>
      <div style="width:14px;height:14px;border-radius:50%;background:${COLOR_PALETTE[c.color % COLOR_PALETTE.length].bg};border:1px solid var(--border2);cursor:pointer;" onclick="cycleCatColor(${i}, this)" title="색상 변경"></div>
      <button onclick="deleteCat(${i})" style="border:none;background:none;cursor:pointer;color:#dc2626;font-size:14px;padding:0 4px;">✕</button>
    </div>
  `).join('');
}

function cycleCatColor(i, el) {
  const existing = document.getElementById('color-picker-popup');
  if (existing) existing.remove();

  const popup = document.createElement('div');
  popup.id = 'color-picker-popup';
  popup.style.cssText = 'position:absolute;background:var(--bg);border:0.5px solid var(--border2);border-radius:8px;padding:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,0.15);';

  COLOR_PALETTE.forEach((col, ci) => {
    const dot = document.createElement('button');
    dot.style.cssText = `width:22px;height:22px;border-radius:50%;background:${col.bg};border:${ci === categories[i].color ? '2px solid var(--text)' : '1px solid var(--border2)'};cursor:pointer;`;
    dot.onclick = (e) => {
      e.stopPropagation();
      categories[i].color = ci;
      saveCats(); renderCatList(); renderGrid();
      popup.remove();
    };
    popup.appendChild(dot);
  });

  el.style.position = 'relative';
  el.parentElement.style.position = 'relative';
  el.parentElement.appendChild(popup);
  popup.style.top = '24px';
  popup.style.right = '0';

  setTimeout(() => {
    document.addEventListener('click', function handler(e) {
      if (!popup.contains(e.target)) { popup.remove(); document.removeEventListener('click', handler); }
    });
  }, 0);
}

function addCat() {
  const emoji = document.getElementById('new-cat-emoji').value.trim() || '⭐';
  const name  = document.getElementById('new-cat-name').value.trim();
  if (!name) { document.getElementById('new-cat-name').focus(); return; }
  if (categories.find(c => c.name === name)) { alert('이미 있는 카테고리예요'); return; }
  categories.push({ name, emoji, color: categories.length % COLOR_PALETTE.length });
  saveCats(); renderCatList(); renderGrid();
  document.getElementById('new-cat-emoji').value = '';
  document.getElementById('new-cat-name').value = '';
}

function deleteCat(i) {
  if (categories.length <= 1) { alert('카테고리가 최소 1개는 있어야 해요'); return; }
  categories.splice(i, 1);
  saveCats(); renderCatList(); renderGrid();
}
function toMin(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
function minToStr(min) { return `${String(Math.floor(min/60)).padStart(2,'0')}:${String(min%60).padStart(2,'0')}`; }

function formatDateLabel(d) {
  const dt = new Date(d + 'T00:00:00');
  const days = ['일','월','화','수','목','금','토'];
  return `${dt.getMonth()+1}월 ${dt.getDate()}일 (${days[dt.getDay()]})`;
}

function changeDate(delta) {
  const [y, m, d] = currentDate.split('-').map(Number);
  const dt = new Date(y, m - 1, d + delta);
  currentDate = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  updateDateUI();
  data = { plan: [], actual: [] };
  renderGrid();
  loadFromNotion();
}

function pickDate(val) {
  if (!val) return;
  currentDate = val;
  const [y, m] = val.split('-').map(Number);
  calYear = y; calMonth_ = m;
  updateDateUI();
  data = { plan: [], actual: [] };
  renderGrid();
  loadFromNotion();
}

function updateDateUI() {
  document.getElementById('date-label-text').textContent = formatDateLabel(currentDate);
}

let calYear = 0, calMonth_ = 0;

function toggleCal() {
  const pop = document.getElementById('cal-popup');
  if (pop.style.display === 'none') {
    const [y, m] = currentDate.split('-').map(Number);
    calYear = y; calMonth_ = m;
    renderCal();
    pop.style.display = 'block';
    setTimeout(() => document.addEventListener('click', closeCal), 0);
  } else {
    pop.style.display = 'none';
    document.removeEventListener('click', closeCal);
  }
}

function closeCal(e) {
  const pop = document.getElementById('cal-popup');
  if (!pop.contains(e.target) && e.target.id !== 'date-label-text') {
    pop.style.display = 'none';
    document.removeEventListener('click', closeCal);
  }
}

function calMonth(delta) {
  calMonth_ += delta;
  if (calMonth_ > 12) { calMonth_ = 1; calYear++; }
  if (calMonth_ < 1)  { calMonth_ = 12; calYear--; }
  renderCal();
}

function renderCal() {
  const [cy, cm, cd] = currentDate.split('-').map(Number);
  document.getElementById('cal-title').textContent = `${calYear}년 ${calMonth_}월`;
  const first = new Date(calYear, calMonth_ - 1, 1).getDay();
  const days  = new Date(calYear, calMonth_, 0).getDate();
  const container = document.getElementById('cal-days');
  container.innerHTML = '';
  for (let i = 0; i < first; i++) {
    const empty = document.createElement('span'); container.appendChild(empty);
  }
  for (let d = 1; d <= days; d++) {
    const btn = document.createElement('button');
    const dateStr = `${calYear}-${String(calMonth_).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === currentDate;
    btn.textContent = d;
    btn.style.cssText = `border:none;cursor:pointer;border-radius:50%;width:26px;height:26px;font-size:12px;
      background:${isToday ? 'var(--text)' : 'none'};
      color:${isToday ? 'var(--bg)' : 'var(--text)'};
      font-weight:${isToday ? '600' : '400'};`;
    btn.onclick = (e) => {
      e.stopPropagation();
      pickDate(dateStr);
      document.getElementById('cal-popup').style.display = 'none';
      document.removeEventListener('click', closeCal);
    };
    container.appendChild(btn);
  }
}

function setStatus(msg, type='') {
  const el = document.getElementById('sync-badge');
  el.textContent = msg;
  el.className = 'sync-badge' + (type ? ' ' + type : '');
  if (type === 'ok') setTimeout(() => { el.textContent = ''; el.className = 'sync-badge'; }, 2000);
}

// ── 핵심: 10분 그리드 렌더링 ──
function renderGrid() {
  const grid = document.getElementById('planner-grid');
  grid.innerHTML = '';

  HOURS.forEach(h => {
    // 시간 라벨
    const labelCell = document.createElement('div');
    labelCell.className = 'hour-label-cell';
    labelCell.innerHTML = `<span>${String(h).padStart(2,'0')}:00</span>`;
    grid.appendChild(labelCell);

    // 계획 열 / 실제 열
    ['plan','actual'].forEach(type => {
      const col = document.createElement('div');
      col.className = 'cells-col';

      // 10분 칸 6개
      const tenGrid = document.createElement('div');
      tenGrid.className = 'ten-min-grid';

      for (let m = 0; m < 6; m++) {
        const min = h * 60 + m * 10;
        const timeStr = minToStr(min);
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.time = timeStr;
        cell.dataset.type = type;
        cell.onclick = () => openModalAtTime(type, timeStr);
        tenGrid.appendChild(cell);
      }
      col.appendChild(tenGrid);

      // 블록 오버레이
      const blocks = data[type].filter(b => {
        const bs = toMin(b.start), be = toMin(b.end);
        const hs = h * 60, he = (h + 1) * 60;
        return bs < he && be > hs;
      });

      blocks.forEach(b => {
        const bs = toMin(b.start), be = toMin(b.end);
        const hs = h * 60, he = (h + 1) * 60;
        const startInHour = Math.max(bs, hs) - hs;
        const endInHour   = Math.min(be, he) - hs;
        const leftPct  = (startInHour / 60) * 100;
        const widthPct = ((endInHour - startInHour) / 60) * 100;
        const col2 = getCatColor(b.cat);

        const overlay = document.createElement('button');
        overlay.className = 'block-overlay';
        overlay.style.cssText = `left:calc(${leftPct}% + 1px);width:calc(${widthPct}% - 2px);background:${col2.bg};color:${col2.text}`;
        const spansManyMins = (endInHour - startInHour) >= 20;
        overlay.innerHTML = `<div class="block-title">${b.title}</div>${spansManyMins ? `<div class="block-time-label">${b.start}–${b.end}</div>` : ''}`;
        overlay.onclick = (e) => { e.stopPropagation(); openModal(type, b.id); };
        col.appendChild(overlay);
      });

      grid.appendChild(col);
    });
  });
}

function openModalAtTime(type, timeStr) {
  const endMin = toMin(timeStr) + 60;
  const endStr = minToStr(Math.min(endMin, 24*60));
  openModal(type, null, timeStr, endStr);
}

function openModal(type, id=null, defaultStart='09:00', defaultEnd='10:00') {
  currentType = type; editingId = id;
  const del = document.getElementById('btn-del');
  if (id) {
    const b = data[type].find(x=>x.id===id);
    document.getElementById('modal-title').textContent = '블록 수정';
    document.getElementById('f-title').value = b.title;
    document.getElementById('f-start').value = b.start;
    document.getElementById('f-end').value   = b.end;
    refreshCatSelect(b.cat);
    document.getElementById('f-memo').value  = b.memo||'';
    del.style.display = 'block';
  } else {
    document.getElementById('modal-title').textContent = (type==='plan'?'계획':'실제 기록')+' 추가';
    document.getElementById('f-title').value = '';
    document.getElementById('f-start').value = defaultStart;
    document.getElementById('f-end').value   = defaultEnd;
    refreshCatSelect('학습');
    document.getElementById('f-memo').value  = '';
    del.style.display = 'none';
  }
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 50);
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); editingId = null; }

function saveBlock() {
  const title = document.getElementById('f-title').value.trim();
  const start = document.getElementById('f-start').value;
  const end   = document.getElementById('f-end').value;
  const cat   = document.getElementById('f-cat').value;
  const memo  = document.getElementById('f-memo').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  if (toMin(end) <= toMin(start)) { alert('종료 시간은 시작 시간 이후여야 해요'); return; }
  if (editingId) {
    const idx = data[currentType].findIndex(x=>x.id===editingId);
    data[currentType][idx] = { id:editingId, title, start, end, cat, memo };
  } else {
    data[currentType].push({ id:uid(), title, start, end, cat, memo });
  }
  closeModal();
  renderGrid();
  scheduleAutoSave();
}

function deleteBlock() {
  data[currentType] = data[currentType].filter(x=>x.id!==editingId);
  closeModal();
  renderGrid();
  scheduleAutoSave();
}

document.getElementById('modal-bg').addEventListener('click', e => { if (e.target===e.currentTarget) closeModal(); });
document.getElementById('cat-modal-bg').addEventListener('click', e => { if (e.target===e.currentTarget) closeCatManager(); });

function scheduleAutoSave() {
  clearTimeout(saveTimer);
  setStatus('저장 대기 중...');
  saveTimer = setTimeout(() => saveToNotion(), 1500);
}

async function saveToNotion() {
  const blocks = [
    ...data.plan.map(b=>({...b, type:'plan'})),
    ...data.actual.map(b=>({...b, type:'actual'}))
  ];
  setStatus('저장 중...', 'syncing');
  try {
    const res = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date: currentDate, blocks })
    });
    if (!res.ok) throw new Error('서버 오류');
    setStatus('저장됨', 'ok');
  } catch(e) {
    setStatus('저장 실패', 'err');
  }
}

async function loadFromNotion() {
  setStatus('불러오는 중...', 'syncing');
  try {
    const res = await fetch('/api/load', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date: currentDate })
    });
    if (!res.ok) throw new Error('서버 오류');
    const result = await res.json();
    data.plan   = (result.plan   || []).map(b=>({...b, id:uid()}));
    data.actual = (result.actual || []).map(b=>({...b, id:uid()}));
    renderGrid();
    setStatus('동기화됨', 'ok');
  } catch(e) {
    setStatus('오류', 'err');
  }
}

const [_iy, _im] = currentDate.split('-').map(Number);
calYear = _iy; calMonth_ = _im;
updateDateUI();
refreshCatSelect();
renderGrid();
loadFromNotion();
</script>
